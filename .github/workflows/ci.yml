name: CI — DevSecOps Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:8
        ports: ["27017:27017"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint + security rules)
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test_secret_ci_only_never_use_in_prod

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high
        continue-on-error: false # tune to `false` once dependency baseline is clean

      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST (Semgrep — OWASP Top 10 ruleset)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/owasp-top-ten
        continue-on-error: false # tune to `false` once findings are triaged

      - name: Build Docker image (build-only, no push)
        run: docker build -t hybrid-lms-backend:${{ github.sha }} .
